# Netlify deploy config — static site, no build step.
# Connect this repo to a Netlify site once; every push to `main` then
# auto-publishes the repo root.

[build]
  publish = "."
  command = ""

# Pretty URLs: /about -> about.html, /terms -> terms.html
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Long-cache the immutable assets (images, video, helix frames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/frames/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/frames-plan/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
